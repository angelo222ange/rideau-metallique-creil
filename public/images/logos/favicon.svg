<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B7A4E"/>
      <stop offset="100%" style="stop-color:#155E3B"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Rideau metallique lines (subtle) -->
  <g opacity="0.12">
    <rect x="40" y="60" width="432" height="8" rx="4" fill="white"/>
    <rect x="40" y="84" width="432" height="8" rx="4" fill="white"/>
    <rect x="40" y="108" width="432" height="8" rx="4" fill="white"/>
    <rect x="40" y="132" width="432" height="8" rx="4" fill="white"/>
  </g>
  <!-- DRM text -->
  <text x="256" y="340" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="220" fill="white" text-anchor="middle" letter-spacing="-8">DRM</text>
  <!-- Bottom bar -->
  <rect x="120" y="380" width="272" height="6" rx="3" fill="#34d399" opacity="0.8"/>
  <!-- Tagline -->
  <text x="256" y="440" font-family="Arial, sans-serif" font-weight="700" font-size="52" fill="white" text-anchor="middle" opacity="0.7" letter-spacing="12">CREIL</text>
</svg>
